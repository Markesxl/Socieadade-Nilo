<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Sociedade Parque Nilo dos Santos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fc;
        }
        #sidebar-wrapper {
            min-height: 100vh;
            background: linear-gradient(180deg, #2c3e50 0%, #1a2634 100%);
            transition: margin 0.25s ease-out;
        }
        #sidebar-wrapper .list-group-item {
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            transition: 0.3s;
            background-color: transparent;
            color: white;
        }
        #sidebar-wrapper .list-group-item:hover {
            background-color: #34495e !important;
            color: white !important;
            padding-left: 30px;
        }
        #page-content-wrapper {
            min-width: 0;
            width: 100%;
        }
        #menu-toggle {
            background-color: #2c3e50;
            border: none;
        }
        .primary-text {
            color: #4e73df;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
        .btn-primary {
            background-color: #4e73df;
            border-color: #4e73df;
        }
        .btn-primary:hover {
            background-color: #2e59d9;
            border-color: #2653d4;
        }
        .sidebar-heading {
            color: #fff;
        }
        .foto-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 5px;
        }
        .navbar-brand-centered {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="text-white" id="sidebar-wrapper" style="min-width: 250px;">
            <div class="sidebar-heading text-center py-4 primary-text fs-4 fw-bold text-uppercase border-bottom">Menu</div>
            <div class="list-group list-group-flush my-3">
                <a href="#" class="list-group-item list-group-item-action" id="link-home"><i class="fas fa-home me-2"></i>Home</a>
                <a href="#" class="list-group-item list-group-item-action" id="link-cadastro"><i class="fas fa-user-plus me-2"></i>Cadastro de Sócios</a>
                <a href="#" class="list-group-item list-group-item-action" id="link-mensalidades"><i class="fas fa-money-bill me-2"></i>Mensalidades</a>
                <a href="#" class="list-group-item list-group-item-action" id="link-relatorios"><i class="fas fa-chart-bar me-2"></i>Relatórios</a>
                <a href="#" class="list-group-item list-group-item-action" id="link-carteirinha"><i class="fas fa-id-card me-2"></i>Carteirinha</a>
            </div>
        </div>
        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom position-relative">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="menu-toggle"><i class="fas fa-bars"></i></button>
                    <span class="navbar-brand-centered">Sociedade Parque Nilo dos Santos</span>
                </div>
            </nav>
            <div class="container-fluid px-4" id="content-area">
                <!-- Conteúdo dinâmico será inserido aqui via JavaScript -->
            </div>
        </div>
    </div>

    <!-- Scripts (bibliotecas e nosso código) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        (function() {
            let socios = [];

            // Carregar dados do localStorage
            if (localStorage.getItem('socios')) {
                socios = JSON.parse(localStorage.getItem('socios'));
            } else {
                socios = [];
                salvarLocalStorage();
            }

            function salvarLocalStorage() {
                localStorage.setItem('socios', JSON.stringify(socios));
            }

            function buscarSocioPorId(id) {
                return socios.find(s => s.id === id);
            }

            // Função para gerar novo ID sequencial começando em 1
            function gerarNovoId() {
                if (socios.length === 0) return 1;
                const ids = socios.map(s => s.id);
                return Math.max(...ids) + 1;
            }

            // Função para renderizar conteúdo
            function carregarConteudo(secao, socio = null) {
                const contentArea = document.getElementById('content-area');
                switch(secao) {
                    case 'home':
                        contentArea.innerHTML = gerarHome();
                        break;
                    case 'cadastro':
                        contentArea.innerHTML = gerarFormularioCadastro(socio);
                        break;
                    case 'mensalidades':
                        contentArea.innerHTML = gerarTelaMensalidades();
                        break;
                    case 'relatorios':
                        contentArea.innerHTML = gerarTelaRelatorios();
                        break;
                    case 'carteirinha':
                        contentArea.innerHTML = gerarTelaCarteirinha();
                        break;
                    default:
                        contentArea.innerHTML = gerarHome();
                }
            }

            // ---------- HOME (ex-Dashboard) com foto do membro ----------
            function gerarHome() {
                let html = `
                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h5>Sócios Cadastrados</h5>
                                    <button class="btn btn-primary btn-sm" id="btn-novo-socio">Novo Sócio</button>
                                </div>
                                <div class="card-body">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>Foto</th>
                                                <th>ID</th>
                                                <th>Nome</th>
                                                <th>CPF</th>
                                                <th>Classificação</th>
                                                <th>Situação</th>
                                                <th>Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                `;
                socios.forEach(s => {
                    html += `
                        <tr>
                            <td>${s.foto ? `<img src="${s.foto}" class="foto-thumb">` : '<i class="fas fa-user-circle fa-2x text-secondary"></i>'}</td>
                            <td>${s.id}</td>
                            <td>${s.nomeCompleto || ''}</td>
                            <td>${s.cpf || ''}</td>
                            <td>${s.classificacao || ''}</td>
                            <td><span class="badge ${s.situacao === 'Ativo' ? 'bg-success' : 'bg-secondary'}">${s.situacao || ''}</span></td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editarSocio(${s.id})"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="excluirSocio(${s.id})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
                html += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                // Após inserir o HTML, adicionar evento ao botão "Novo Sócio"
                setTimeout(() => {
                    document.getElementById('btn-novo-socio')?.addEventListener('click', () => {
                        carregarConteudo('cadastro');
                    });
                }, 0);
                return html;
            }

            window.editarSocio = function(id) {
                const socio = buscarSocioPorId(id);
                carregarConteudo('cadastro', socio);
            };

            window.excluirSocio = function(id) {
                if (confirm('Tem certeza que deseja excluir este sócio?')) {
                    socios = socios.filter(s => s.id !== id);
                    salvarLocalStorage();
                    carregarConteudo('home');
                }
            };

            // ---------- FORMULÁRIO DE CADASTRO (com novo campo Presidente que filiou) ----------
            function gerarFormularioCadastro(socio = null) {
                const isEdicao = socio !== null;
                const title = isEdicao ? 'Editar Sócio' : 'Novo Sócio';
                const buttonText = isEdicao ? 'Atualizar' : 'Salvar';

                function valor(campo) {
                    return socio && socio[campo] ? socio[campo] : '';
                }

                return `
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5>${title}</h5>
                        </div>
                        <div class="card-body">
                            <form id="form-socio">
                                <input type="hidden" id="socio-id" value="${isEdicao ? socio.id : ''}">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="nomeCompleto" class="form-label">Nome Completo*</label>
                                        <input type="text" class="form-control" id="nomeCompleto" value="${valor('nomeCompleto')}" required>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="apelido" class="form-label">Apelido</label>
                                        <input type="text" class="form-control" id="apelido" value="${valor('apelido')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="foto" class="form-label">Foto 3x4</label>
                                        <input type="file" class="form-control" id="foto" accept="image/*">
                                        ${socio && socio.foto ? '<img src="' + socio.foto + '" alt="foto" style="width: 50px; height: 50px; object-fit: cover; margin-top: 5px;">' : ''}
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="rg" class="form-label">RG</label>
                                        <input type="text" class="form-control" id="rg" value="${valor('rg')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="cpf" class="form-label">CPF</label>
                                        <input type="text" class="form-control" id="cpf" value="${valor('cpf')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                                        <input type="date" class="form-control" id="dataNascimento" value="${valor('dataNascimento')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="sexo" class="form-label">Sexo</label>
                                        <select class="form-select" id="sexo">
                                            <option value="">Selecione</option>
                                            <option value="Masculino" ${socio && socio.sexo === 'Masculino' ? 'selected' : ''}>Masculino</option>
                                            <option value="Feminino" ${socio && socio.sexo === 'Feminino' ? 'selected' : ''}>Feminino</option>
                                            <option value="Outro" ${socio && socio.sexo === 'Outro' ? 'selected' : ''}>Outro</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="estadoCivil" class="form-label">Estado Civil</label>
                                        <input type="text" class="form-control" id="estadoCivil" value="${valor('estadoCivil')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="escolaridade" class="form-label">Escolaridade</label>
                                        <input type="text" class="form-control" id="escolaridade" value="${valor('escolaridade')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="naturalidade" class="form-label">Naturalidade</label>
                                        <input type="text" class="form-control" id="naturalidade" value="${valor('naturalidade')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="profissao" class="form-label">Profissão</label>
                                        <input type="text" class="form-control" id="profissao" value="${valor('profissao')}">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="pai" class="form-label">Nome do Pai</label>
                                        <input type="text" class="form-control" id="pai" value="${valor('pai')}">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="mae" class="form-label">Nome da Mãe</label>
                                        <input type="text" class="form-control" id="mae" value="${valor('mae')}">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="filiadoDesde" class="form-label">Filiado Desde</label>
                                        <input type="date" class="form-control" id="filiadoDesde" value="${valor('filiadoDesde')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="classificacao" class="form-label">Classificação</label>
                                        <select class="form-select" id="classificacao">
                                            <option value="Sócio" ${socio && socio.classificacao === 'Sócio' ? 'selected' : ''}>Sócio</option>
                                            <option value="Comissionado" ${socio && socio.classificacao === 'Comissionado' ? 'selected' : ''}>Comissionado</option>
                                            <option value="Ex-Presidente" ${socio && socio.classificacao === 'Ex-Presidente' ? 'selected' : ''}>Ex-Presidente</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="situacao" class="form-label">Situação</label>
                                        <select class="form-select" id="situacao">
                                            <option value="Ativo" ${socio && socio.situacao === 'Ativo' ? 'selected' : ''}>Ativo</option>
                                            <option value="Inativo" ${socio && socio.situacao === 'Inativo' ? 'selected' : ''}>Inativo</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="presidenteFiliou" class="form-label">Presidente que filiou</label>
                                        <input type="text" class="form-control" id="presidenteFiliou" value="${valor('presidenteFiliou')}">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="telefoneCelular" class="form-label">Telefone Celular</label>
                                        <input type="text" class="form-control" id="telefoneCelular" value="${valor('telefoneCelular')}">
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="cep" class="form-label">CEP</label>
                                        <input type="text" class="form-control" id="cep" value="${valor('cep')}">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="endereco" class="form-label">Endereço</label>
                                        <input type="text" class="form-control" id="endereco" value="${valor('endereco')}">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-2 mb-3">
                                        <label for="numero" class="form-label">Número</label>
                                        <input type="text" class="form-control" id="numero" value="${valor('numero')}">
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="complemento" class="form-label">Complemento</label>
                                        <input type="text" class="form-control" id="complemento" value="${valor('complemento')}">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="bairro" class="form-label">Bairro</label>
                                        <input type="text" class="form-control" id="bairro" value="${valor('bairro')}">
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="cidade" class="form-label">Cidade</label>
                                        <input type="text" class="form-control" id="cidade" value="${valor('cidade')}">
                                    </div>
                                    <div class="col-md-2 mb-3">
                                        <label for="estado" class="form-label">Estado</label>
                                        <input type="text" class="form-control" id="estado" value="${valor('estado')}">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="tipoResidencia" class="form-label">Tipo de Residência</label>
                                        <input type="text" class="form-control" id="tipoResidencia" value="${valor('tipoResidencia')}">
                                    </div>
                                    <div class="col-md-8 mb-3">
                                        <label for="observacoes" class="form-label">Observações</label>
                                        <textarea class="form-control" id="observacoes" rows="2">${valor('observacoes')}</textarea>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary">${buttonText}</button>
                                <button type="button" class="btn btn-secondary" onclick="carregarConteudo('home')">Cancelar</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            // Event listener para o formulário de cadastro
            document.addEventListener('submit', function(e) {
                if (e.target && e.target.id === 'form-socio') {
                    e.preventDefault();
                    salvarSocio();
                }
            });

            function salvarSocio() {
                const id = document.getElementById('socio-id').value;
                const nomeCompleto = document.getElementById('nomeCompleto').value;
                const apelido = document.getElementById('apelido').value;
                const rg = document.getElementById('rg').value;
                const cpf = document.getElementById('cpf').value;
                const dataNascimento = document.getElementById('dataNascimento').value;
                const sexo = document.getElementById('sexo').value;
                const estadoCivil = document.getElementById('estadoCivil').value;
                const escolaridade = document.getElementById('escolaridade').value;
                const naturalidade = document.getElementById('naturalidade').value;
                const profissao = document.getElementById('profissao').value;
                const pai = document.getElementById('pai').value;
                const mae = document.getElementById('mae').value;
                const filiadoDesde = document.getElementById('filiadoDesde').value;
                const classificacao = document.getElementById('classificacao').value;
                const situacao = document.getElementById('situacao').value;
                const presidenteFiliou = document.getElementById('presidenteFiliou').value;
                const telefoneCelular = document.getElementById('telefoneCelular').value;
                const cep = document.getElementById('cep').value;
                const endereco = document.getElementById('endereco').value;
                const numero = document.getElementById('numero').value;
                const complemento = document.getElementById('complemento').value;
                const bairro = document.getElementById('bairro').value;
                const cidade = document.getElementById('cidade').value;
                const estado = document.getElementById('estado').value;
                const tipoResidencia = document.getElementById('tipoResidencia').value;
                const observacoes = document.getElementById('observacoes').value;
                const fotoInput = document.getElementById('foto');

                const salvarDados = (foto) => {
                    const socio = {
                        id: id ? parseInt(id) : gerarNovoId(),
                        nomeCompleto,
                        apelido,
                        rg,
                        cpf,
                        dataNascimento,
                        sexo,
                        estadoCivil,
                        escolaridade,
                        naturalidade,
                        profissao,
                        pai,
                        mae,
                        filiadoDesde,
                        classificacao,
                        situacao,
                        presidenteFiliou,
                        telefoneCelular,
                        cep,
                        endereco,
                        numero,
                        complemento,
                        bairro,
                        cidade,
                        estado,
                        tipoResidencia,
                        observacoes,
                        foto: foto || (id ? buscarSocioPorId(parseInt(id)).foto : ''),
                        mensalidades: id ? (buscarSocioPorId(parseInt(id)).mensalidades || []) : []
                    };

                    if (id) {
                        const index = socios.findIndex(s => s.id === parseInt(id));
                        socios[index] = socio;
                    } else {
                        socios.push(socio);
                    }

                    salvarLocalStorage();
                    carregarConteudo('home');
                    alert('Sócio salvo com sucesso!');
                };

                if (fotoInput.files.length > 0) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        salvarDados(e.target.result);
                    };
                    reader.readAsDataURL(fotoInput.files[0]);
                } else {
                    salvarDados(null);
                }
            }

            // ---------- MENSALIDADES (igual, mas ajustado para chamadas globais) ----------
            function gerarTelaMensalidades() {
                let html = `
                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header">
                                    <h5>Controle de Mensalidades</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table">
                                        <thead>
                                            <tr>
                                                <th>Sócio</th>
                                                <th>Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                `;
                socios.forEach(s => {
                    html += `
                        <tr>
                            <td>${s.nomeCompleto}</td>
                            <td><button class="btn btn-sm btn-primary" onclick="gerenciarMensalidades(${s.id})">Gerenciar</button></td>
                        </tr>
                    `;
                });
                html += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                return html;
            }

            window.gerenciarMensalidades = function(id) {
                const socio = buscarSocioPorId(id);
                let html = `
                    <div class="card mt-4">
                        <div class="card-header d-flex justify-content-between">
                            <h5>Mensalidades de ${socio.nomeCompleto}</h5>
                            <button class="btn btn-secondary btn-sm" onclick="carregarConteudo('mensalidades')">Voltar</button>
                        </div>
                        <div class="card-body">
                            <form id="form-mensalidade">
                                <input type="hidden" id="socio-id-mensalidade" value="${socio.id}">
                                <div class="row">
                                    <div class="col-md-3">
                                        <label>Mês/Ano</label>
                                        <input type="month" class="form-control" id="mesAno" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label>Valor (R$)</label>
                                        <input type="number" step="0.01" class="form-control" id="valorMensalidade" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label>Pago?</label>
                                        <select class="form-select" id="pagoMensalidade">
                                            <option value="false">Não</option>
                                            <option value="true">Sim</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3 align-self-end">
                                        <button type="submit" class="btn btn-primary">Lançar</button>
                                    </div>
                                </div>
                            </form>
                            <hr>
                            <h6>Mensalidades lançadas</h6>
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Mês/Ano</th>
                                        <th>Valor</th>
                                        <th>Pago</th>
                                        <th>Data Pagamento</th>
                                        <th>Comprovante</th>
                                    </tr>
                                </thead>
                                <tbody id="tabela-mensalidades">
                `;

                if (socio.mensalidades) {
                    socio.mensalidades.forEach(m => {
                        html += `
                            <tr>
                                <td>${m.mesAno}</td>
                                <td>R$ ${m.valor.toFixed(2)}</td>
                                <td>${m.pago ? 'Sim' : 'Não'}</td>
                                <td>${m.dataPagamento || ''}</td>
                                <td>${m.pago ? `<button class="btn btn-sm btn-success" onclick="gerarComprovante(${socio.id}, '${m.mesAno}')">PDF</button>` : ''}</td>
                            </tr>
                        `;
                    });
                }

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;

                document.getElementById('content-area').innerHTML = html;

                document.getElementById('form-mensalidade').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const socioId = parseInt(document.getElementById('socio-id-mensalidade').value);
                    const mesAno = document.getElementById('mesAno').value;
                    const valor = parseFloat(document.getElementById('valorMensalidade').value);
                    const pago = document.getElementById('pagoMensalidade').value === 'true';

                    const socio = buscarSocioPorId(socioId);
                    if (!socio.mensalidades) socio.mensalidades = [];

                    const existe = socio.mensalidades.find(m => m.mesAno === mesAno);
                    if (existe) {
                        alert('Mensalidade já lançada para este mês/ano.');
                        return;
                    }

                    socio.mensalidades.push({
                        mesAno: mesAno,
                        valor: valor,
                        pago: pago,
                        dataPagamento: pago ? new Date().toISOString().split('T')[0] : null
                    });

                    salvarLocalStorage();
                    gerenciarMensalidades(socioId);
                });
            };

            window.gerarComprovante = function(socioId, mesAno) {
                const socio = buscarSocioPorId(socioId);
                const mensalidade = socio.mensalidades.find(m => m.mesAno === mesAno);
                if (!mensalidade) return;

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(18);
                doc.text('Comprovante de Pagamento', 20, 20);
                doc.setFontSize(12);
                doc.text(`Sociedade Recreativa Parque Nilo dos Santos`, 20, 30);
                doc.text(`Sócio: ${socio.nomeCompleto}`, 20, 40);
                doc.text(`Mês/Ano: ${mesAno}`, 20, 50);
                doc.text(`Valor: R$ ${mensalidade.valor.toFixed(2)}`, 20, 60);
                doc.text(`Data do Pagamento: ${mensalidade.dataPagamento}`, 20, 70);
                doc.text('Status: PAGO', 20, 80);
                doc.text('Assinatura: __________________________', 20, 100);
                doc.save(`comprovante_${socio.nomeCompleto}_${mesAno}.pdf`);
            };

            // ---------- CARTEIRINHA (com dimensões de cartão de crédito) ----------
            function gerarTelaCarteirinha() {
                let html = `
                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header">
                                    <h5>Gerar Carteirinha</h5>
                                </div>
                                <div class="card-body">
                                    <table class="table">
                                        <thead>
                                            <tr>
                                                <th>Sócio</th>
                                                <th>Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                `;
                socios.forEach(s => {
                    html += `
                        <tr>
                            <td>${s.nomeCompleto}</td>
                            <td><button class="btn btn-sm btn-primary" onclick="gerarCarteirinha(${s.id})">Gerar Carteirinha</button></td>
                        </tr>
                    `;
                });
                html += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                return html;
            }

            window.gerarCarteirinha = function(socioId) {
                const socio = buscarSocioPorId(socioId);
                // Dimensões do cartão de crédito (CR80) em mm: 85.6mm x 53.98mm
                // Vamos criar um elemento com essas dimensões em pixels (considerando 96 DPI: 1mm = 3.78px aproximadamente)
                const widthMm = 85.6;
                const heightMm = 53.98;
                const pxPerMm = 3.78; // 96 DPI / 25.4
                const widthPx = Math.round(widthMm * pxPerMm);
                const heightPx = Math.round(heightMm * pxPerMm);

                const carteirinhaDiv = document.createElement('div');
                carteirinhaDiv.id = 'carteirinha-temp';
                carteirinhaDiv.style.width = widthPx + 'px';
                carteirinhaDiv.style.height = heightPx + 'px';
                carteirinhaDiv.style.padding = '5px';
                carteirinhaDiv.style.border = '2px solid #000';
                carteirinhaDiv.style.borderRadius = '10px';
                carteirinhaDiv.style.backgroundColor = '#fff';
                carteirinhaDiv.style.fontFamily = 'Poppins, sans-serif';
                carteirinhaDiv.style.fontSize = '10px';
                carteirinhaDiv.style.display = 'flex';
                carteirinhaDiv.style.flexDirection = 'column';
                carteirinhaDiv.style.justifyContent = 'center';
                carteirinhaDiv.style.alignItems = 'center';
                carteirinhaDiv.style.position = 'fixed';
                carteirinhaDiv.style.top = '-1000px';
                carteirinhaDiv.style.left = '-1000px';
                carteirinhaDiv.innerHTML = `
                    <div style="text-align: center; width: 100%;">
                        <h3 style="font-size: 14px; margin: 0;">Sociedade Recreativa</h3>
                        <h4 style="font-size: 12px; margin: 0;">Parque Nilo dos Santos</h4>
                        <hr style="margin: 5px 0;">
                        ${socio.foto ? `<img src="${socio.foto}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 5px;">` : '<div style="width:40px;height:40px;background:#ccc;margin:auto;">Sem Foto</div>'}
                        <p style="margin: 2px 0;"><strong>${socio.nomeCompleto}</strong></p>
                        <p style="margin: 2px 0;">CPF: ${socio.cpf || '---'}</p>
                        <p style="margin: 2px 0;">Nº ${socio.id}</p>
                        <p style="margin: 2px 0;">Validade: ${new Date().getFullYear() + 1}</p>
                    </div>
                `;
                document.body.appendChild(carteirinhaDiv);

                html2canvas(carteirinhaDiv, {
                    scale: 2, // Melhor qualidade
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    // Criar PDF com as dimensões exatas em mm
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: [widthMm, heightMm]
                    });
                    pdf.addImage(imgData, 'PNG', 0, 0, widthMm, heightMm);
                    pdf.save(`carteirinha_${socio.nomeCompleto}.pdf`);

                    document.body.removeChild(carteirinhaDiv);
                });
            };

            // ---------- RELATÓRIOS (corrigido para exibir resultados) ----------
            function gerarTelaRelatorios() {
                return `
                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header">
                                    <h5>Relatórios</h5>
                                </div>
                                <div class="card-body">
                                    <div class="btn-group mb-3" role="group">
                                        <button class="btn btn-outline-primary" onclick="filtrarSocios('todos')">Todos</button>
                                        <button class="btn btn-outline-success" onclick="filtrarSocios('adimplentes')">Adimplentes</button>
                                        <button class="btn btn-outline-danger" onclick="filtrarSocios('inadimplentes')">Inadimplentes</button>
                                        <button class="btn btn-outline-info" onclick="filtrarSocios('ativos')">Ativos</button>
                                        <button class="btn btn-outline-secondary" onclick="filtrarSocios('inativos')">Inativos</button>
                                    </div>
                                    <div id="resultado-relatorio">
                                        <!-- Resultado do filtro será inserido aqui -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            window.filtrarSocios = function(tipo) {
                let listaFiltrada = [];
                const hoje = new Date();
                const mesAtual = hoje.getMonth() + 1;
                const anoAtual = hoje.getFullYear();
                const mesAnoAtual = `${anoAtual}-${mesAtual.toString().padStart(2, '0')}`;

                switch(tipo) {
                    case 'todos':
                        listaFiltrada = socios;
                        break;
                    case 'adimplentes':
                        listaFiltrada = socios.filter(s => {
                            if (!s.mensalidades || s.mensalidades.length === 0) return false;
                            const mensalidadeAtual = s.mensalidades.find(m => m.mesAno === mesAnoAtual);
                            return mensalidadeAtual && mensalidadeAtual.pago;
                        });
                        break;
                    case 'inadimplentes':
                        listaFiltrada = socios.filter(s => {
                            if (!s.mensalidades || s.mensalidades.length === 0) return true;
                            const mensalidadeAtual = s.mensalidades.find(m => m.mesAno === mesAnoAtual);
                            return !mensalidadeAtual || !mensalidadeAtual.pago;
                        });
                        break;
                    case 'ativos':
                        listaFiltrada = socios.filter(s => s.situacao === 'Ativo');
                        break;
                    case 'inativos':
                        listaFiltrada = socios.filter(s => s.situacao === 'Inativo');
                        break;
                }

                let html = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Classificação</th>
                                <th>Situação</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                if (listaFiltrada.length === 0) {
                    html += `<tr><td colspan="3" class="text-center">Nenhum sócio encontrado.</td></tr>`;
                } else {
                    listaFiltrada.forEach(s => {
                        html += `
                            <tr>
                                <td>${s.nomeCompleto}</td>
                                <td>${s.classificacao || ''}</td>
                                <td>${s.situacao || ''}</td>
                            </tr>
                        `;
                    });
                }
                html += `</tbody></table>`;

                document.getElementById('resultado-relatorio').innerHTML = html;
            };

            // ---------- EVENTOS DE MENU ----------
            document.getElementById('link-home').addEventListener('click', (e) => {
                e.preventDefault();
                carregarConteudo('home');
            });
            document.getElementById('link-cadastro').addEventListener('click', (e) => {
                e.preventDefault();
                carregarConteudo('cadastro');
            });
            document.getElementById('link-mensalidades').addEventListener('click', (e) => {
                e.preventDefault();
                carregarConteudo('mensalidades');
            });
            document.getElementById('link-relatorios').addEventListener('click', (e) => {
                e.preventDefault();
                carregarConteudo('relatorios');
            });
            document.getElementById('link-carteirinha').addEventListener('click', (e) => {
                e.preventDefault();
                carregarConteudo('carteirinha');
            });

            // Menu toggle para dispositivos móveis
            document.getElementById('menu-toggle').addEventListener('click', function() {
                const sidebar = document.getElementById('sidebar-wrapper');
                if (sidebar.style.marginLeft === '-250px') {
                    sidebar.style.marginLeft = '0';
                } else {
                    sidebar.style.marginLeft = '-250px';
                }
            });

            // Iniciar com home
            carregarConteudo('home');
        })();
    </script>
</body>
</html>
